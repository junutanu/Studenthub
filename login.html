<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtgKd1TPar5u28Qnl0IofIN6YmSkMbfyo",
  authDomain: "studenthub-ce1ed.firebaseapp.com",
  projectId: "studenthub-ce1ed",
  storageBucket: "studenthub-ce1ed.appspot.com",
  messagingSenderId: "1034161999610",
  appId: "1:1034161999610:web:dc06e123040c0df72f4343"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {

  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      document.getElementById("msg").innerText = "Login Successful ✔";

      setTimeout(() => {
        window.location.href = "./dashboard.html";
      }, 800);

    })
    .catch(e => {
      document.getElementById("msg").innerText = e.message;
    });

};

</script>

</body>
</html>
