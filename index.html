<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentHub Login</title>

  <style>
    body{
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#4facfe;
      margin:0;
    }

    .box{
      background:white;
      padding:25px;
      border-radius:10px;
      width:280px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
    }

    button{
      width:100%;
      padding:10px;
      background:#2196f3;
      color:white;
      border:none;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>StudentHub Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="loginUser()">Login</button>

  <p id="msg"></p>
</div>

<script type="module">

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 Firebase config (IMPORTANT)
const firebaseConfig = {
  apiKey: "AIzaSyBtgKd1TPar5u28Qnl0IofIN6YmSkMbfyo",
  authDomain: "studenthub-ce1ed.firebaseapp.com",
  projectId: "studenthub-ce1ed",
  storageBucket: "studenthub-ce1ed.appspot.com",
  messagingSenderId: "1034161999610",
  appId: "1:1034161999610:web:dc06e123040c0df72f4343"
};

// 🔥 Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 Login function
window.loginUser = function () {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerText = "Login Successful ✔";

      // redirect
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);

    })
    .catch((error) => {
      document.getElementById("msg").innerText = error.message;
    });

};

</script>

</body>
</html>
